---
- name: Reset k3s cluster
  hosts: k3s_cluster
  gather_facts: true
  roles:
    - role: reset
      become: true
  post_tasks:
    - name: Reboot and wait for nodes to come back up
      become: true
      ansible.builtin.reboot:
        reboot_command: "{{ custom_reboot_command | default(omit) }}"
        reboot_timeout: 3600

- name: Remove local kubeconfig
  hosts: localhost
  tasks:
    - name: Remove ./kubeconfig
      ansible.builtin.file:
        path: "./kubeconfig"
        state: absent
    - name: Remove ~/.kube
      ansible.builtin.file:
        path: "~/.kube"
        state: absent
      when: copy_kube_config

- name: Revert changes to Proxmox cluster
  hosts: proxmox
  gather_facts: true
  become: true
  remote_user: "{{ proxmox_lxc_ssh_user }}"
  roles:
    - role: reset_proxmox_lxc
      when: proxmox_lxc_configure

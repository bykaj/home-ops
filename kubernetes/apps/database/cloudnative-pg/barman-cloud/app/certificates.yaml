---
# yaml-language-server: $schema=https://schemas.bykaj.io/cert-manager.io/issuer_v1.json
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: barman-cloud-selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: barman-cloud-client
  namespace: database
spec:
  commonName: barman-cloud-client
  duration: 2160h
  isCA: false
  issuerRef:
    name: barman-cloud-selfsigned-issuer
    kind: Issuer
    group: cert-manager.io
  renewBefore: 360h
  secretName: barman-cloud-client-tls
  usages:
    - client auth
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: barman-cloud-server
  namespace: database
spec:
  commonName: barman-cloud
  dnsNames:
    - barman-cloud
  duration: 2160h
  isCA: false
  issuerRef:
    name: barman-cloud-selfsigned-issuer
    kind: Issuer
    group: cert-manager.io
  renewBefore: 360h
  secretName: barman-cloud-server-tls
  usages:
    - server auth

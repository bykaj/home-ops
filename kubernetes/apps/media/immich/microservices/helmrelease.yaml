---
# yaml-language-server: $schema=https://schemas.bykaj.io/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich-microservices
spec:
  chartRef:
    kind: OCIRepository
    name: immich-microservices
  interval: 1h
  dependsOn:
    - name: immich
  values:
    controllers:
      immich:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.3@sha256:c716dc20f957aafd89fa9d284a2ec63e25c9e2d8d8e87c6197d540a3dce237db
            env:
              IMMICH_MEDIA_LOCATION: &mediaLocation /data
              IMMICH_WORKERS_EXCLUDE: "api"
              TZ: "${TIMEZONE}"
            envFrom:
              - secretRef:
                  name: immich-secret
            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /server-info/ping
            #         port: &port 2283
            #       initialDelaySeconds: 0
            #       periodSeconds: 10
            #       timeoutSeconds: 1
            #       failureThreshold: 5
            #   readiness: *probes
            #   startup:
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /api/server/ping
            #         port: *port
            #       failureThreshold: 30
            #       periodSeconds: 5
            #       successThreshold: 1
            #       timeoutSeconds: 1
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 8Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      enableServiceLinks: false
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: "${APP}-gpu"
      securityContext:
        runAsNonRoot: true
        runAsUser: 4000
        runAsGroup: 4000
        fsGroup: 4000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [44]
    persistence:
      library:
        type: nfs
        server: "${NAS_HOST}"
        path: /mnt/vault/Photos/Library
        globalMounts:
          - path: *mediaLocation

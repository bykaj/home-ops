---
# yaml-language-server: $schema=https://schemas.bykaj.io/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app configarr
spec:
  chartRef:
    kind: OCIRepository
    name: configarr
  interval: 1h
  values:
    controllers:
      configarr:
        type: cronjob
        annotations:
          reloader.stakater.com/auto: "true"
        cronjob:
          schedule: "0 * * * *" # Runs every hour
          timeZone: ${TZ}
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/raydak-labs/configarr
              tag: 1.27.0@sha256:a258a9b195fe2034519cbc28b3b79ced4afa2e22f3da5eca7cb7bcf55c3129c1
            env:
              TZ: "${TIMEZONE}"
            envFrom:
              - secretRef:
                  name: configarr-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 4000
        runAsGroup: 4000
        fsGroup: 4000
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      config:
        enabled: true
        type: configMap
        name: configarr-config
        globalMounts:
          - path: /app/config/config.yml
            subPath: config.yml
            readOnly: true
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /app/repos
            subPath: repos
